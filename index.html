<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video Recorder & Teleprompter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Merriweather:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
            font-family: 'Open Sans', sans-serif;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #334155;
        }
        #preview-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Kita akan handle mirroring dalam kod drawing canvas */
        }
        #hidden-video {
            display: none;
        }
        #prompter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            z-index: 5;
        }
        #prompter-scroll {
            width: 80%;
            height: 60%;
            overflow-y: hidden;
            text-align: center;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent, black 20%; black 80%; transparent);
        }
        #prompter-text {
            white-space: pre-wrap;
            transition: transform 0.1s linear;
        }
        .control-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
        }
        input[type="range"] {
            accent-color: #3b82f6;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Pro Prompter & Recorder</h1>
            <p class="text-gray-400 text-sm">Versi Latar Belakang Tersuai (Ultra HD)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Bahagian Utama: Video & Prompter -->
            <div class="lg:col-span-2 space-y-4">
                <div id="video-container">
                    <video id="hidden-video" autoplay muted playsinline></video>
                    <canvas id="preview-canvas"></canvas>
                    
                    <!-- Timer / Stopwatch Overlay -->
                    <div id="timer-display" class="absolute top-4 left-4 bg-black/60 px-4 py-2 rounded-lg border border-white/20 font-mono text-xl text-white hidden z-10">
                        00:00:00
                    </div>

                    <div id="prompter-overlay">
                        <div id="prompter-scroll">
                            <div id="prompter-text" class="pt-[30%] pb-[30%]">Sila masukkan teks anda di ruangan bawah...</div>
                        </div>
                    </div>

                    <!-- Penunjuk Status -->
                    <div id="recording-status" class="hidden absolute top-4 right-4 flex items-center space-x-2 bg-red-600 px-3 py-1 rounded-full animate-pulse z-10">
                        <div class="w-3 h-3 bg-white rounded-full"></div>
                        <span class="text-xs font-bold uppercase">Merakam</span>
                    </div>
                </div>

                <div class="control-panel p-4 rounded-xl shadow-lg border border-slate-700 flex flex-wrap justify-center gap-4">
                    <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zM14.553 7.106A1 1 0 0014 8v4a1 1 0 00.553.894l2 1A1 1 0 0018 13V7a1 1 0 00-1.447-.894l-2 1z"></path></svg>
                        Mula Rakaman
                    </button>
                    <button id="stop-btn" disabled class="bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition">
                        Berhenti
                    </button>
                    <button id="reset-btn" class="bg-slate-600 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Reset
                    </button>
                    <button id="download-btn" disabled class="bg-green-600 hover:bg-green-700 disabled:opacity-50 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition">
                        <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z"></path></svg>
                        Simpan Rakaman
                    </button>
                </div>
            </div>

            <!-- Bahagian Kawalan: Tetapan -->
            <div class="space-y-6">
                <!-- Muat Naik Latar Belakang -->
                <div class="control-panel p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold mb-3 border-b border-slate-600 pb-2 text-pink-400">Latar Belakang Video</h2>
                    <label class="block text-xs text-gray-400 mb-2">Muat naik imej (.jpg, .png):</label>
                    <input type="file" id="bg-upload" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-600 file:text-white hover:file:bg-pink-700 cursor-pointer mb-3">
                    <button id="clear-bg" class="w-full bg-slate-700 py-1 rounded text-xs hover:bg-slate-600">Kosongkan Latar</button>
                </div>

                <!-- Editor Teks -->
                <div class="control-panel p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold mb-3 border-b border-slate-600 pb-2">Teks Prompter</h2>
                    <textarea id="text-input" class="w-full h-40 bg-slate-800 text-white p-3 rounded-lg border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Paste teks anda di sini..."></textarea>
                </div>

                <!-- Konfigurasi -->
                <div class="control-panel p-5 rounded-xl border border-slate-700 space-y-4">
                    <h2 class="text-lg font-semibold border-b border-slate-600 pb-2 text-blue-300">Tetapan Prompter</h2>
                    
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Saiz Fon: <span id="font-size-val">30</span>px</label>
                        <input type="range" id="font-size" min="16" max="80" value="30" class="w-full">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Kelajuan Skrol: <span id="scroll-speed-val">30</span></label>
                        <input type="range" id="scroll-speed" min="0" max="100" value="30" class="w-full">
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Jenis Fon</label>
                        <select id="font-family" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-sm">
                            <option value="'Open Sans', sans-serif">Sans Serif</option>
                            <option value="'Merriweather', serif">Serif (Formal)</option>
                            <option value="'Roboto', sans-serif">Roboto</option>
                            <option value="monospace">Monospace</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Resolusi Kamera</label>
                        <select id="video-res" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-sm text-yellow-400">
                            <option value="720">HD (720p)</option>
                            <option value="1080">Full HD (1080p)</option>
                            <option value="2000">Ultra HD (2000p)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Warna Latar Prompter</label>
                        <div class="flex gap-2">
                            <button class="bg-black w-8 h-8 rounded border border-white" onclick="changeBg('rgba(0,0,0,0.5)')"></button>
                            <button class="bg-blue-900 w-8 h-8 rounded border border-white" onclick="changeBg('rgba(30,58,138,0.5)')"></button>
                            <button class="bg-green-900 w-8 h-8 rounded border border-white" onclick="changeBg('rgba(20,83,45,0.5)')"></button>
                            <button class="bg-transparent w-8 h-8 rounded border border-white flex items-center justify-center text-[10px]" onclick="changeBg('transparent')">Tiada</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-full shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        Mesej di sini
    </div>

    <script>
        const video = document.getElementById('hidden-video');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('text-input');
        const prompterText = document.getElementById('prompter-text');
        const prompterScroll = document.getElementById('prompter-scroll');
        const prompterOverlay = document.getElementById('prompter-overlay');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const resetBtn = document.getElementById('reset-btn');
        const downloadBtn = document.getElementById('download-btn');
        const fontSizeInput = document.getElementById('font-size');
        const speedInput = document.getElementById('scroll-speed');
        const fontSelect = document.getElementById('font-family');
        const resSelect = document.getElementById('video-res');
        const recordingStatus = document.getElementById('recording-status');
        const timerDisplay = document.getElementById('timer-display');
        const bgUpload = document.getElementById('bg-upload');
        const clearBgBtn = document.getElementById('clear-bg');

        let mediaRecorder;
        let recordedChunks = [];
        let scrollInterval;
        let scrollPos = 0;
        let stream;
        let startTime;
        let timerInterval;
        let bgImage = null;
        let renderLoopId;

        // Muat naik imej latar belakang
        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        bgImage = img;
                        showToast("Latar belakang ditukar.");
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        clearBgBtn.onclick = () => {
            bgImage = null;
            bgUpload.value = '';
            showToast("Latar belakang dikosongkan.");
        };

        // Kamera Logic
        async function openCamera() {
            const height = parseInt(resSelect.value);
            const constraints = {
                video: {
                    width: { ideal: height * (16/9) },
                    height: { ideal: height },
                    facingMode: "user"
                },
                audio: true
            };

            try {
                // Berhenti stream sedia ada jika ada
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                // Pastikan video sedang dimainkan
                await video.play();

                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        startRendering();
                        resolve(true);
                    };
                    // Fallback jika loadedmetadata sudah berlaku
                    if (video.readyState >= 2) {
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        startRendering();
                        resolve(true);
                    }
                });
            } catch (err) {
                console.error(err);
                showToast("Akses kamera atau mikrofon gagal.");
                return false;
            }
        }

        // Loop untuk melukis video dan background ke canvas
        function startRendering() {
            if (renderLoopId) cancelAnimationFrame(renderLoopId);

            function render() {
                // Simpan keadaan asal
                ctx.save();
                
                // Mirror effect
                ctx.scale(-1, 1);
                ctx.translate(-canvas.width, 0);

                // Lukis latar belakang jika ada
                if (bgImage) {
                    const canvasRatio = canvas.width / canvas.height;
                    const imgRatio = bgImage.width / bgImage.height;
                    let drawW, drawH, drawX, drawY;

                    if (imgRatio > canvasRatio) {
                        drawH = canvas.height;
                        drawW = bgImage.width * (canvas.height / bgImage.height);
                        drawX = (canvas.width - drawW) / 2;
                        drawY = 0;
                    } else {
                        drawW = canvas.width;
                        drawH = bgImage.height * (canvas.width / bgImage.width);
                        drawX = 0;
                        drawY = (canvas.height - drawH) / 2;
                    }
                    ctx.drawImage(bgImage, drawX, drawY, drawW, drawH);
                } else {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // Lukis video di atas background
                // Jika ingin "green screen" AI, memerlukan pemprosesan piksel, tetapi di sini kita lukis video terus.
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                ctx.restore();
                renderLoopId = requestAnimationFrame(render);
            }
            render();
        }

        function closeCamera() {
            if (renderLoopId) cancelAnimationFrame(renderLoopId);
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }
        }

        // Prompter Settings
        textInput.addEventListener('input', () => {
            prompterText.innerText = textInput.value || "Sila masukkan teks anda di ruangan bawah...";
            resetScroll();
        });

        fontSizeInput.addEventListener('input', () => {
            const val = fontSizeInput.value;
            document.getElementById('font-size-val').innerText = val;
            prompterText.style.fontSize = val + 'px';
        });

        fontSelect.addEventListener('change', () => {
            prompterText.style.fontFamily = fontSelect.value;
        });

        speedInput.addEventListener('input', () => {
            document.getElementById('scroll-speed-val').innerText = speedInput.value;
            if (scrollInterval) startScrolling(false);
        });

        function changeBg(color) {
            prompterOverlay.style.backgroundColor = color;
        }

        function startScrolling(resetPos = true) {
            clearInterval(scrollInterval);
            if (resetPos) scrollPos = 0;
            const speed = parseInt(speedInput.value);
            if (speed === 0) return;
            const step = speed / 10;
            scrollInterval = setInterval(() => {
                scrollPos += step;
                prompterScroll.scrollTop = scrollPos;
                if (scrollPos > prompterScroll.scrollHeight) scrollPos = -200; 
            }, 50);
        }

        function resetScroll() {
            clearInterval(scrollInterval);
            scrollInterval = null;
            scrollPos = 0;
            prompterScroll.scrollTop = 0;
        }

        function updateTimer() {
            const now = Date.now();
            const diff = now - startTime;
            const hours = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const minutes = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const seconds = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            timerDisplay.innerText = `${hours}:${minutes}:${seconds}`;
        }

        // Record Logic
        startBtn.onclick = async () => {
            const success = await openCamera();
            if (!success) return;

            recordedChunks = [];
            
            // Tangkap stream dari canvas supaya imej/video ikut dirakam
            const canvasStream = canvas.captureStream(30);
            const audioTrack = stream.getAudioTracks()[0];
            if (audioTrack) canvasStream.addTrack(audioTrack);

            try {
                mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm; codecs=vp9,opus' });
            } catch (e) {
                mediaRecorder = new MediaRecorder(canvasStream, { mimeType: 'video/webm' });
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                downloadBtn.disabled = false;
                downloadBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `rakaman_hd_${new Date().getTime()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showToast("Muat turun bermula.");
                };
            };

            mediaRecorder.start();
            startScrolling(true);
            startTime = Date.now();
            timerDisplay.classList.remove('hidden');
            timerInterval = setInterval(updateTimer, 1000);
            
            startBtn.disabled = true;
            stopBtn.disabled = false;
            resetBtn.disabled = true;
            recordingStatus.classList.remove('hidden');
            showToast("Mula merakam...");
        };

        stopBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            // Jangan tutup kamera terus supaya pengguna boleh lihat preview
            resetScroll();
            clearInterval(timerInterval);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            resetBtn.disabled = false;
            recordingStatus.classList.add('hidden');
            showToast("Rakaman tamat.");
        };

        resetBtn.onclick = () => {
            resetScroll();
            closeCamera();
            timerDisplay.classList.add('hidden');
            recordedChunks = [];
            downloadBtn.disabled = true;
            // Kosongkan canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            showToast("Sedia semula.");
        };

        // Mulakan kamera secara automatik pada permulaan
        window.addEventListener('load', () => {
            openCamera();
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 3000);
        }
    </script>
</body>
</html>
