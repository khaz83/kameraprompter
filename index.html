<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video Recorder & Teleprompter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Merriweather:wght@400;700&family=Roboto+Mono:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
            font-family: 'Open Sans', sans-serif;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #334155;
            transition: all 0.3s ease;
            touch-action: none;
        }
        #video-container:fullscreen {
            max-width: 100vw;
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            border: none;
        }
        #preview-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: zoom-in;
        }
        #hidden-video {
            display: none;
        }
        #prompter-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            z-index: 5;
        }
        #prompter-scroll {
            width: 85%;
            height: 70%;
            overflow-y: hidden;
            text-align: center;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }
        #prompter-text {
            white-space: pre-wrap;
            line-height: 1.6;
            transition: transform 0.1s linear;
        }
        .control-panel {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
        }
        .video-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            pointer-events: auto;
        }
        .video-btn:hover {
            background: rgba(59, 130, 246, 0.8);
            transform: scale(1.1);
        }
        input[type="range"] {
            accent-color: #3b82f6;
        }
        .empty-state-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #64748b;
            text-align: center;
            z-index: 1;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl font-bold text-blue-400">Pro Prompter & Recorder</h1>
            <p class="text-gray-400 text-sm">Hantar Rakaman Terus ke Google Drive (Tanpa Simpan Lokal)</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-4">
                <div id="video-container">
                    <div id="camera-off-msg" class="empty-state-msg">
                        <svg class="w-16 h-16 mx-auto mb-2 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        <p>Sila tekan 'Aktifkan Kamera' untuk melaras Zoom</p>
                    </div>
                    <video id="hidden-video" autoplay muted playsinline></video>
                    <canvas id="preview-canvas"></canvas>
                    
                    <div class="absolute top-4 left-4 right-4 flex justify-between items-start z-20 pointer-events-none">
                        <div id="timer-display" class="bg-black/60 px-4 py-2 rounded-lg border border-white/20 font-mono text-xl text-white hidden">
                            00:00:00
                        </div>
                        <button id="maximize-btn" class="video-btn text-white" title="Skrin Penuh">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                        </button>
                    </div>

                    <div id="prompter-overlay">
                        <div id="prompter-scroll">
                            <div id="prompter-text" class="pt-[30%] pb-[30%]">Sila masukkan teks anda di ruangan bawah...</div>
                        </div>
                    </div>

                    <div id="recording-status" class="hidden absolute bottom-4 left-4 flex items-center space-x-2 bg-red-600 px-3 py-1 rounded-full animate-pulse z-20">
                        <div class="w-3 h-3 bg-white rounded-full"></div>
                        <span class="text-xs font-bold uppercase">Merakam</span>
                    </div>
                </div>

                <div class="control-panel p-4 rounded-xl shadow-lg border border-slate-700 flex flex-wrap justify-center gap-4">
                    <button id="prep-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition shadow-lg">
                        Aktifkan Kamera
                    </button>
                    <button id="start-btn" disabled class="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition shadow-lg">
                        Mula Rakaman
                    </button>
                    <button id="stop-btn" disabled class="bg-red-600 hover:bg-red-700 disabled:opacity-50 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition">
                        Berhenti
                    </button>
                    <button id="reset-btn" class="bg-slate-600 hover:bg-slate-700 text-white px-6 py-2 rounded-lg font-semibold flex items-center transition">
                        Reset
                    </button>
                    <div class="flex flex-col gap-2">
                        <button id="upload-drive-btn" disabled class="bg-blue-500 hover:bg-blue-600 disabled:opacity-50 text-white px-6 py-2 rounded-lg font-semibold flex items-center justify-center transition shadow-[0_0_15px_rgba(59,130,246,0.4)]">
                            <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-2h2v2zm0-4H9V5h2v4z"></path></svg>
                            Upload ke Google Drive
                        </button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="control-panel p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold mb-3 border-b border-slate-600 pb-2 text-pink-400 flex items-center">
                        Latar Belakang
                    </h2>
                    <input type="file" id="bg-upload" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-600 file:text-white hover:file:bg-pink-700 cursor-pointer mb-3">
                    <div class="grid grid-cols-2 gap-2">
                        <button id="set-white-bg" class="bg-white text-black py-1 rounded text-xs font-bold hover:bg-gray-200 transition">Latar Putih</button>
                        <button id="clear-bg" class="bg-slate-700 py-1 rounded text-xs hover:bg-slate-600 transition">Kosongkan Latar</button>
                    </div>
                </div>

                <div class="control-panel p-5 rounded-xl border border-slate-700">
                    <h2 class="text-lg font-semibold mb-3 border-b border-slate-600 pb-2">Teks Prompter</h2>
                    <textarea id="text-input" class="w-full h-40 bg-slate-800 text-white p-3 rounded-lg border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="Paste skrip anda di sini..."></textarea>
                </div>

                <div class="control-panel p-5 rounded-xl border border-slate-700 space-y-4">
                    <h2 class="text-lg font-semibold border-b border-slate-600 pb-2 text-blue-300">Tetapan Visual</h2>
                    
                    <div id="zoom-controls" class="hidden">
                        <label class="block text-xs text-gray-400 mb-1">Zoom Kamera: <span id="zoom-val">1</span>x</label>
                        <div class="flex items-center space-x-2">
                            <button id="zoom-out-btn" class="bg-slate-700 hover:bg-slate-600 text-white w-10 h-10 rounded-lg font-bold transition flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                            </button>
                            <input type="range" id="zoom-slider" min="1" max="10" step="0.1" value="1" class="flex-grow h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer">
                            <button id="zoom-in-btn" class="bg-slate-700 hover:bg-slate-600 text-white w-10 h-10 rounded-lg font-bold transition flex items-center justify-center">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Jenis Tulisan (Font)</label>
                        <select id="font-family" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-sm">
                            <option value="'Open Sans', sans-serif">Sans Serif (Default)</option>
                            <option value="'Merriweather', serif">Serif (Klasik)</option>
                            <option value="'Roboto Mono', monospace">Monospace (Kod)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Saiz Fon: <span id="font-size-val">30</span>px</label>
                        <input type="range" id="font-size" min="16" max="100" value="30" class="w-full">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Kelajuan Skrol: <span id="scroll-speed-val">30</span></label>
                        <input type="range" id="scroll-speed" min="0" max="100" value="30" class="w-full">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Resolusi Rakaman</label>
                        <select id="video-res" class="w-full bg-slate-800 p-2 rounded border border-slate-600 text-sm text-yellow-400">
                            <option value="720">HD (720p)</option>
                            <option value="1080" selected>Full HD (1080p)</option>
                            <option value="2160">Ultra HD (4K)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-full shadow-xl opacity-0 transition-opacity duration-300 pointer-events-none z-50 text-center min-w-[200px]">
        Mesej
    </div>

    <script>
        const video = document.getElementById('hidden-video');
        const canvas = document.getElementById('preview-canvas');
        const ctx = canvas.getContext('2d');
        const videoContainer = document.getElementById('video-container');
        const cameraOffMsg = document.getElementById('camera-off-msg');
        const textInput = document.getElementById('text-input');
        const prompterText = document.getElementById('prompter-text');
        const prompterScroll = document.getElementById('prompter-scroll');
        const prepBtn = document.getElementById('prep-btn');
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const resetBtn = document.getElementById('reset-btn');
        const uploadBtn = document.getElementById('upload-drive-btn');
        const fontSizeInput = document.getElementById('font-size');
        const fontFamilySelect = document.getElementById('font-family');
        const speedInput = document.getElementById('scroll-speed');
        const resSelect = document.getElementById('video-res');
        const recordingStatus = document.getElementById('recording-status');
        const timerDisplay = document.getElementById('timer-display');
        const bgUpload = document.getElementById('bg-upload');
        const clearBgBtn = document.getElementById('clear-bg');
        const setWhiteBgBtn = document.getElementById('set-white-bg');
        const maximizeBtn = document.getElementById('maximize-btn');

        const zoomControls = document.getElementById('zoom-controls');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomValDisp = document.getElementById('zoom-val');
        const zoomInBtn = document.getElementById('zoom-in-btn');
        const zoomOutBtn = document.getElementById('zoom-out-btn');

        let mediaRecorder;
        let recordedChunks = [];
        let scrollInterval;
        let scrollPos = 0;
        let stream = null;
        let startTime;
        let timerInterval;
        let bgImage = null;
        let bgColor = null;
        let renderLoopId;
        let isRecording = false;
        let initialDistance = null;

        // Pautan Google Drive anda
        const DRIVE_FOLDER_URL = "https://drive.google.com/drive/folders/1z8CaYkrPMraN2LFSv7DujsFBi7JP8IJ_?usp=sharing";

        maximizeBtn.onclick = () => {
            if (!document.fullscreenElement) {
                videoContainer.requestFullscreen().catch(err => showToast("Gagal skrin penuh"));
            } else {
                document.exitFullscreen();
            }
        };

        bgUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        bgImage = img;
                        bgColor = null;
                        showToast("Latar belakang imej dipasang.");
                        if (!stream) drawStaticPreview();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        setWhiteBgBtn.onclick = () => {
            bgImage = null;
            bgColor = "#FFFFFF";
            showToast("Latar belakang putih ditetapkan.");
            if (!stream) drawStaticPreview();
        };

        clearBgBtn.onclick = () => {
            bgImage = null;
            bgColor = null;
            bgUpload.value = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            showToast("Latar belakang dikosongkan.");
        };

        async function startCamera() {
            const height = parseInt(resSelect.value);
            const constraints = {
                video: { 
                    width: { ideal: height * (16/9) }, 
                    height: { ideal: height }, 
                    facingMode: "user" 
                },
                audio: true
            };

            try {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                cameraOffMsg.classList.add('hidden');
                await video.play();
                
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const track = stream.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                
                if (capabilities.zoom) {
                    zoomControls.classList.remove('hidden');
                    zoomSlider.min = capabilities.zoom.min;
                    zoomSlider.max = capabilities.zoom.max;
                    zoomSlider.step = capabilities.zoom.step || 0.1;
                    const currentZoom = zoomSlider.value || capabilities.zoom.min;
                    zoomSlider.value = Math.max(capabilities.zoom.min, Math.min(capabilities.zoom.max, currentZoom));
                    updateZoomUI(zoomSlider.value);
                } else {
                    zoomControls.classList.add('hidden');
                }

                startRendering();
                startBtn.disabled = false;
                return true;
            } catch (err) {
                showToast("Sila benarkan akses kamera/mikrofon.");
                return false;
            }
        }

        async function updateZoomUI(val) {
            val = parseFloat(val);
            if (val > parseFloat(zoomSlider.max)) val = parseFloat(zoomSlider.max);
            if (val < parseFloat(zoomSlider.min)) val = parseFloat(zoomSlider.min);
            zoomSlider.value = val;
            zoomValDisp.innerText = val.toFixed(1);
            if (!stream) return;
            const track = stream.getVideoTracks()[0];
            const capabilities = track.getCapabilities();
            if (capabilities.zoom) {
                try {
                    await track.applyConstraints({ advanced: [{ zoom: val }] });
                } catch (e) {}
            }
        }

        canvas.addEventListener('wheel', (e) => {
            if (!stream || isRecording) return;
            e.preventDefault();
            let currentVal = parseFloat(zoomSlider.value);
            let newVal = e.deltaY < 0 ? currentVal + 0.2 : currentVal - 0.2;
            updateZoomUI(newVal);
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (!stream || isRecording || e.touches.length !== 2 || initialDistance === null) return;
            e.preventDefault();
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            const delta = currentDistance - initialDistance;
            let newVal = parseFloat(zoomSlider.value) + (delta * 0.01);
            updateZoomUI(newVal);
            initialDistance = currentDistance;
        }, { passive: false });

        canvas.addEventListener('touchend', () => initialDistance = null);
        zoomSlider.oninput = (e) => updateZoomUI(e.target.value);
        zoomInBtn.onclick = () => updateZoomUI(parseFloat(zoomSlider.value) + 0.3);
        zoomOutBtn.onclick = () => updateZoomUI(parseFloat(zoomSlider.value) - 0.3);

        function stopCamera() {
            if (renderLoopId) cancelAnimationFrame(renderLoopId);
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }
            cameraOffMsg.classList.remove('hidden');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStaticPreview();
        }

        function startRendering() {
            if (renderLoopId) cancelAnimationFrame(renderLoopId);
            function render() {
                if (!stream) return;
                ctx.save();
                ctx.scale(-1, 1);
                ctx.translate(-canvas.width, 0);
                if (bgImage) {
                    const canvasRatio = canvas.width / canvas.height;
                    const imgRatio = bgImage.width / bgImage.height;
                    let dW, dH, dX, dY;
                    if (imgRatio > canvasRatio) {
                        dH = canvas.height; dW = bgImage.width * (canvas.height / bgImage.height);
                        dX = (canvas.width - dW) / 2; dY = 0;
                    } else {
                        dW = canvas.width; dH = bgImage.height * (canvas.width / bgImage.width);
                        dX = 0; dY = (canvas.height - dH) / 2;
                    }
                    ctx.drawImage(bgImage, dX, dY, dW, dH);
                } else if (bgColor) {
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                } else {
                    ctx.fillStyle = '#000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                ctx.restore();
                renderLoopId = requestAnimationFrame(render);
            }
            render();
        }

        function drawStaticPreview() {
            if (canvas.width === 0) { canvas.width = 1280; canvas.height = 720; }
            if (bgImage) ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            else if (bgColor) { ctx.fillStyle = bgColor; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        }

        textInput.addEventListener('input', () => {
            prompterText.innerText = textInput.value || "Sila masukkan teks anda di ruangan bawah...";
            resetScroll();
        });

        fontSizeInput.addEventListener('input', () => {
            const val = fontSizeInput.value;
            document.getElementById('font-size-val').innerText = val;
            prompterText.style.fontSize = val + 'px';
        });

        fontFamilySelect.addEventListener('change', () => prompterText.style.fontFamily = fontFamilySelect.value);
        speedInput.addEventListener('input', () => {
            document.getElementById('scroll-speed-val').innerText = speedInput.value;
            if (scrollInterval) startScrolling(false);
        });

        function startScrolling(resetPos = true) {
            clearInterval(scrollInterval);
            if (resetPos) scrollPos = 0;
            const speed = parseInt(speedInput.value);
            if (speed === 0) return;
            scrollInterval = setInterval(() => {
                scrollPos += speed / 15;
                prompterScroll.scrollTop = scrollPos;
                if (scrollPos > prompterScroll.scrollHeight + 100) scrollPos = -200;
            }, 30);
        }

        function resetScroll() {
            clearInterval(scrollInterval);
            scrollInterval = null;
            scrollPos = 0;
            prompterScroll.scrollTop = 0;
        }

        function updateTimer() {
            const diff = Date.now() - startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            timerDisplay.innerText = `${h}:${m}:${s}`;
        }

        prepBtn.onclick = async () => {
            const success = await startCamera();
            if (success) {
                showToast("Kamera sedia. Boleh zoom terus pada skrin.");
                prepBtn.classList.add('hidden');
            }
        };

        startBtn.onclick = async () => {
            if (!stream) {
                const success = await startCamera();
                if (!success) return;
            }
            isRecording = true;
            recordedChunks = [];
            const canvasStream = canvas.captureStream(30);
            const audioTrack = stream.getAudioTracks()[0];
            if (audioTrack) canvasStream.addTrack(audioTrack);
            const mime = ['video/webm;codecs=vp9,opus', 'video/webm'].find(t => MediaRecorder.isTypeSupported(t));
            mediaRecorder = new MediaRecorder(canvasStream, { mimeType: mime });
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                uploadBtn.disabled = false;
                
                // Logik untuk Membuka Drive tanpa simpan lokal
                uploadBtn.onclick = () => {
                    // Cuba salin pautan video ke clipboard untuk rujukan (jika disokong)
                    try {
                        const dummy = document.createElement('textarea');
                        document.body.appendChild(dummy);
                        dummy.value = url;
                        dummy.select();
                        document.execCommand('copy');
                        document.body.removeChild(dummy);
                        showToast("Pautan video sedia di cache. Membuka Google Drive...");
                    } catch (err) {
                        showToast("Membuka Google Drive...");
                    }

                    // Buka Google Drive dalam tab baru
                    setTimeout(() => {
                        window.open(DRIVE_FOLDER_URL, '_blank');
                    }, 1000);
                };
            };

            mediaRecorder.start();
            startScrolling(true);
            startTime = Date.now();
            timerDisplay.classList.remove('hidden');
            timerInterval = setInterval(updateTimer, 1000);
            startBtn.disabled = true;
            stopBtn.disabled = false;
            resetBtn.disabled = true;
            zoomSlider.disabled = true;
            zoomInBtn.disabled = true;
            zoomOutBtn.disabled = true;
            canvas.style.cursor = 'default';
            recordingStatus.classList.remove('hidden');
            showToast("Rakaman bermula...");
        };

        stopBtn.onclick = () => {
            isRecording = false;
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            resetScroll();
            clearInterval(timerInterval);
            startBtn.disabled = false;
            stopBtn.disabled = true;
            resetBtn.disabled = false;
            zoomSlider.disabled = false;
            zoomInBtn.disabled = false;
            zoomOutBtn.disabled = false;
            canvas.style.cursor = 'zoom-in';
            recordingStatus.classList.add('hidden');
            showToast("Rakaman tamat. Sedia untuk dihantar.");
        };

        resetBtn.onclick = () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            stopCamera();
            resetScroll();
            textInput.value = "";
            prompterText.innerText = "Sila masukkan teks anda di ruangan bawah...";
            bgImage = null; bgColor = null; bgUpload.value = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            timerDisplay.classList.add('hidden');
            timerDisplay.innerText = "00:00:00";
            recordedChunks = [];
            uploadBtn.disabled = true;
            startBtn.disabled = true;
            stopBtn.disabled = true;
            prepBtn.classList.remove('hidden');
            recordingStatus.classList.add('hidden');
            showToast("Reset berjaya.");
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3500);
        }

        window.onload = () => drawStaticPreview();
    </script>
</body>
</html>
